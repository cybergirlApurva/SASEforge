<svg width="900" height="700" viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="700" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">SASEforge — Network Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#666">Secure Access Service Edge simulation using Docker + VirtualBox</text>

  <!-- INTERNET ZONE -->
  <rect x="30" y="75" width="840" height="80" rx="8" fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="44" y="95" font-size="11" fill="#e74c3c" font-weight="bold">Internet / Untrusted Zone</text>
  <rect x="80" y="100" width="120" height="40" rx="6" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
  <text x="140" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#922b21">Remote Users</text>
  <rect x="380" y="100" width="140" height="40" rx="6" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
  <text x="450" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#922b21">SaaS / Cloud Apps</text>
  <rect x="680" y="100" width="130" height="40" rx="6" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
  <text x="745" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#922b21">Public Internet</text>

  <!-- Arrows from Internet down -->
  <line x1="140" y1="140" x2="140" y2="178" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="140" x2="450" y2="178" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="745" y1="140" x2="745" y2="178" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PERIMETER ZONE -->
  <rect x="30" y="178" width="840" height="100" rx="8" fill="none" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="44" y="196" font-size="11" fill="#e67e22" font-weight="bold">Perimeter Layer</text>

  <rect x="50" y="200" width="110" height="50" rx="6" fill="#fdebd0" stroke="#e67e22" stroke-width="1"/>
  <text x="105" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="#784212">WireGuard</text>
  <text x="105" y="236" text-anchor="middle" font-size="10" fill="#a04000">VPN</text>

  <rect x="180" y="200" width="110" height="50" rx="6" fill="#fdebd0" stroke="#e67e22" stroke-width="1"/>
  <text x="235" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="#784212">pfSense</text>
  <text x="235" y="236" text-anchor="middle" font-size="10" fill="#a04000">Firewall</text>

  <rect x="310" y="200" width="110" height="50" rx="6" fill="#fdebd0" stroke="#e67e22" stroke-width="1"/>
  <text x="365" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="#784212">Suricata</text>
  <text x="365" y="236" text-anchor="middle" font-size="10" fill="#a04000">IDS / IPS</text>

  <rect x="440" y="200" width="130" height="50" rx="6" fill="#fdebd0" stroke="#e67e22" stroke-width="1"/>
  <text x="505" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="#784212">Squid Proxy</text>
  <text x="505" y="236" text-anchor="middle" font-size="10" fill="#a04000">CASB Layer</text>

  <rect x="590" y="200" width="130" height="50" rx="6" fill="#fdebd0" stroke="#e67e22" stroke-width="1"/>
  <text x="655" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="#784212">mitmproxy</text>
  <text x="655" y="236" text-anchor="middle" font-size="10" fill="#a04000">SSL Inspection</text>

  <rect x="740" y="200" width="110" height="50" rx="6" fill="#fdebd0" stroke="#e67e22" stroke-width="1"/>
  <text x="795" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="#784212">Block List</text>
  <text x="795" y="236" text-anchor="middle" font-size="10" fill="#a04000">dropbox, wetransfer</text>

  <!-- Arrow down to identity -->
  <line x1="450" y1="278" x2="450" y2="318" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- IDENTITY ZONE -->
  <rect x="30" y="318" width="840" height="100" rx="8" fill="none" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="44" y="336" font-size="11" fill="#8e44ad" font-weight="bold">Identity and Zero Trust Layer</text>

  <rect x="70" y="342" width="140" height="50" rx="6" fill="#e8daef" stroke="#8e44ad" stroke-width="1"/>
  <text x="140" y="362" text-anchor="middle" font-size="11" font-weight="bold" fill="#512e5f">Keycloak</text>
  <text x="140" y="378" text-anchor="middle" font-size="10" fill="#6c3483">OAuth2 / MFA / SSO</text>

  <rect x="240" y="342" width="160" height="50" rx="6" fill="#e8daef" stroke="#8e44ad" stroke-width="1"/>
  <text x="320" y="362" text-anchor="middle" font-size="11" font-weight="bold" fill="#512e5f">Open Policy Agent</text>
  <text x="320" y="378" text-anchor="middle" font-size="10" fill="#6c3483">ZTNA Policy Engine</text>

  <rect x="430" y="342" width="140" height="50" rx="6" fill="#e8daef" stroke="#8e44ad" stroke-width="1"/>
  <text x="500" y="362" text-anchor="middle" font-size="11" font-weight="bold" fill="#512e5f">TOTP / MFA</text>
  <text x="500" y="378" text-anchor="middle" font-size="10" fill="#6c3483">Per-request auth</text>

  <rect x="600" y="342" width="160" height="50" rx="6" fill="#e8daef" stroke="#8e44ad" stroke-width="1"/>
  <text x="680" y="362" text-anchor="middle" font-size="11" font-weight="bold" fill="#512e5f">RBAC Policies</text>
  <text x="680" y="378" text-anchor="middle" font-size="10" fill="#6c3483">admin / employee / deny</text>

  <!-- Arrow down to internal -->
  <line x1="450" y1="418" x2="450" y2="458" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- INTERNAL ZONE -->
  <rect x="30" y="458" width="840" height="100" rx="8" fill="none" stroke="#1a8a1a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="44" y="476" font-size="11" fill="#1a8a1a" font-weight="bold">Internal / Trusted Resources</text>

  <rect x="60" y="482" width="140" height="50" rx="6" fill="#d5f5e3" stroke="#1a8a1a" stroke-width="1"/>
  <text x="130" y="502" text-anchor="middle" font-size="11" font-weight="bold" fill="#145a32">DMZ Web Server</text>
  <text x="130" y="518" text-anchor="middle" font-size="10" fill="#1e8449">nginx — 10.0.1.0/24</text>

  <rect x="230" y="482" width="140" height="50" rx="6" fill="#d5f5e3" stroke="#1a8a1a" stroke-width="1"/>
  <text x="300" y="502" text-anchor="middle" font-size="11" font-weight="bold" fill="#145a32">App Server</text>
  <text x="300" y="518" text-anchor="middle" font-size="10" fill="#1e8449">nginx — 10.0.2.0/24</text>

  <rect x="400" y="482" width="140" height="50" rx="6" fill="#d5f5e3" stroke="#1a8a1a" stroke-width="1"/>
  <text x="470" y="502" text-anchor="middle" font-size="11" font-weight="bold" fill="#145a32">Database</text>
  <text x="470" y="518" text-anchor="middle" font-size="10" fill="#1e8449">PostgreSQL — 10.0.3.0/24</text>

  <rect x="570" y="482" width="160" height="50" rx="6" fill="#d5f5e3" stroke="#1a8a1a" stroke-width="1"/>
  <text x="650" y="502" text-anchor="middle" font-size="11" font-weight="bold" fill="#145a32">Keycloak IdP</text>
  <text x="650" y="518" text-anchor="middle" font-size="10" fill="#1e8449">port 8081</text>

  <rect x="750" y="482" width="100" height="50" rx="6" fill="#d5f5e3" stroke="#1a8a1a" stroke-width="1"/>
  <text x="800" y="502" text-anchor="middle" font-size="11" font-weight="bold" fill="#145a32">OPA</text>
  <text x="800" y="518" text-anchor="middle" font-size="10" fill="#1e8449">port 8181</text>

  <!-- Arrow down to SIEM -->
  <line x1="450" y1="558" x2="450" y2="590" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- SIEM -->
  <rect x="30" y="590" width="840" height="90" rx="8" fill="none" stroke="#2471a3" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="44" y="608" font-size="11" fill="#2471a3" font-weight="bold">SIEM and Monitoring (ELK Stack)</text>

  <rect x="80" y="614" width="160" height="50" rx="6" fill="#d6eaf8" stroke="#2471a3" stroke-width="1"/>
  <text x="160" y="634" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">Elasticsearch</text>
  <text x="160" y="650" text-anchor="middle" font-size="10" fill="#2471a3">Log storage — port 9200</text>

  <rect x="270" y="614" width="160" height="50" rx="6" fill="#d6eaf8" stroke="#2471a3" stroke-width="1"/>
  <text x="350" y="634" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">Logstash</text>
  <text x="350" y="650" text-anchor="middle" font-size="10" fill="#2471a3">Pipeline — port 5044</text>

  <rect x="460" y="614" width="160" height="50" rx="6" fill="#d6eaf8" stroke="#2471a3" stroke-width="1"/>
  <text x="540" y="634" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">Kibana</text>
  <text x="540" y="650" text-anchor="middle" font-size="10" fill="#2471a3">Dashboard — port 5601</text>

  <rect x="650" y="614" width="190" height="50" rx="6" fill="#d6eaf8" stroke="#2471a3" stroke-width="1"/>
  <text x="745" y="634" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">Suricata Alerts</text>
  <text x="745" y="650" text-anchor="middle" font-size="10" fill="#2471a3">eve.json ingestion</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

</svg>
