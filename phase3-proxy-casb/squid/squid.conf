# Squid Proxy Configuration - SASEforge CASB Layer

# Basic settings
http_port 3128
visible_hostname saseforge-proxy

# Block list (CASB rules)
acl blocked_sites dstdomain "/etc/squid/blocked-sites.txt"
http_access deny blocked_sites

# Allow internal network only
acl internal_net src 10.0.1.0/24 10.0.2.0/24 10.0.3.0/24
http_access allow internal_net
http_access deny all

# Logging
access_log /var/log/squid/access.log
cache_log /var/log/squid/cache.log
